<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soma Messages</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
    --bg:           #0b141a;
    --panel:        #111b21;
    --panel2:       #202c33;
    --accent:       #00a884;
    --accent-dark:  #008069;
    --text:         #e9edef;
    --muted:        #8696a0;
    --border:       #313d44;
    --bubble-mine:  #005c4b;
    --bubble-them:  #202c33;
    --read:         #53bdeb;
}
html, body {
    height: 100%;
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
}
#login {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    background: linear-gradient(135deg, #008069 0%, #00a884 100%);
}
#login form {
    background: var(--panel);
    padding: 32px;
    border-radius: 12px;
    width: 320px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
#login h1 {
    font-size: 24px;
    margin-bottom: 4px;
    color: var(--accent);
}
#login p {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
}
#login input {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 14px;
}
#login input:focus { outline: none; border-color: var(--accent); }
button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 12px;
    width: 100%;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
}
button:hover { background: var(--accent-dark); }
button:disabled { opacity: 0.5; cursor: not-allowed; }

#app {
    display: none;
    height: 100%;
    grid-template-columns: 350px 1fr;
}
#app.visible { display: grid; }

#sidebar {
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
}
#sidebar header {
    padding: 16px;
    background: var(--panel2);
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
}
#sidebar header .me {
    display: flex;
    align-items: center;
    gap: 10px;
}
.avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 14px;
}
#sidebar .new-thread {
    padding: 12px 16px;
    background: var(--panel2);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
}
#sidebar .new-thread input {
    flex: 1;
    padding: 8px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-size: 13px;
}
#sidebar .new-thread button { width: auto; padding: 8px 12px; font-size: 13px; }

#thread-list {
    flex: 1;
    overflow-y: auto;
}
.thread-item {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    gap: 12px;
    align-items: center;
}
.thread-item:hover { background: var(--panel2); }
.thread-item.active { background: var(--panel2); }
.thread-item .body {
    flex: 1;
    min-width: 0;
}
.thread-item .name {
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 2px;
}
.thread-item .preview {
    font-size: 13px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.thread-item .meta {
    text-align: right;
    font-size: 11px;
    color: var(--muted);
}
.thread-item .unread {
    background: var(--accent);
    color: white;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 10px;
    margin-top: 4px;
    display: inline-block;
}

#chat {
    display: flex;
    flex-direction: column;
    background: var(--bg);
}
#chat-empty {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 14px;
    flex-direction: column;
    gap: 12px;
}
#chat-empty .logo { font-size: 60px; }
#chat-header {
    padding: 12px 20px;
    background: var(--panel2);
    border-bottom: 1px solid var(--border);
    display: none;
    align-items: center;
    gap: 12px;
}
#chat-header.visible { display: flex; }
#chat-header .name { font-weight: 600; }
#chat-header .status { font-size: 12px; color: var(--muted); }
#chat-header .status.online { color: var(--accent); }

#messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: none;
    flex-direction: column;
    gap: 6px;
    background-image: radial-gradient(circle at 50% 50%, #182229 0%, #0b141a 100%);
}
#messages.visible { display: flex; }
.bubble {
    max-width: 65%;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 14px;
    word-wrap: break-word;
    position: relative;
}
.bubble.mine {
    background: var(--bubble-mine);
    align-self: flex-end;
    border-bottom-right-radius: 2px;
}
.bubble.theirs {
    background: var(--bubble-them);
    align-self: flex-start;
    border-bottom-left-radius: 2px;
}
.bubble .text { white-space: pre-wrap; }
.bubble .meta {
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
    text-align: right;
}
.bubble .ticks {
    display: inline-block;
    margin-left: 4px;
    font-weight: bold;
    letter-spacing: -2px;
}
.bubble .ticks.read { color: var(--read); }
.bubble.theirs .meta { text-align: left; }
.bubble.deleted { opacity: 0.5; font-style: italic; }

#typing {
    padding: 0 20px 4px;
    font-size: 12px;
    color: var(--muted);
    height: 18px;
    display: none;
}
#typing.visible { display: block; }

#compose {
    background: var(--panel2);
    padding: 12px 16px;
    display: none;
    gap: 12px;
    align-items: center;
    border-top: 1px solid var(--border);
}
#compose.visible { display: flex; }
#compose input {
    flex: 1;
    padding: 12px 16px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 24px;
    color: var(--text);
    font-size: 14px;
}
#compose input:focus { outline: none; }
#compose button {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    padding: 0;
    font-size: 20px;
}

#error {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #b91c1c;
    color: white;
    padding: 12px 16px;
    border-radius: 6px;
    font-size: 13px;
    display: none;
}
#error.visible { display: block; }
</style>
</head>
<body>

<!-- ── login ─────────────────────────────────────────── -->
<div id="login">
    <form onsubmit="return login(event)">
        <h1>Soma Messages</h1>
        <p>A WhatsApp-class messenger built on Soma — formally verified message lifecycle, real-time SSE delivery.</p>
        <input type="text" id="username" placeholder="Username (e.g. alice)" required autofocus>
        <input type="text" id="display_name" placeholder="Display name (optional)">
        <button type="submit">Sign in</button>
    </form>
</div>

<!-- ── app ──────────────────────────────────────────── -->
<div id="app">
    <aside id="sidebar">
        <header>
            <div class="me">
                <div class="avatar" id="me-avatar"></div>
                <div>
                    <div style="font-weight:600" id="me-name"></div>
                    <div style="font-size:11px;color:var(--muted)">online</div>
                </div>
            </div>
            <button onclick="logout()" style="width:auto;padding:6px 10px;font-size:12px;background:var(--panel)">Sign out</button>
        </header>
        <div class="new-thread">
            <input type="text" id="new-peer" placeholder="Start chat with…" onkeydown="if(event.key==='Enter') startThread()">
            <button onclick="startThread()">+</button>
        </div>
        <div id="thread-list"></div>
    </aside>

    <main id="chat">
        <header id="chat-header">
            <div class="avatar" id="peer-avatar"></div>
            <div>
                <div class="name" id="peer-name"></div>
                <div class="status" id="peer-status">offline</div>
            </div>
        </header>

        <div id="chat-empty">
            <div class="logo">💬</div>
            <div>Pick a chat from the left, or start a new one.</div>
        </div>

        <div id="messages"></div>

        <div id="typing"></div>

        <div id="compose">
            <input type="text" id="compose-input" placeholder="Type a message" autocomplete="off"
                   onkeydown="onComposeKey(event)">
            <button onclick="sendMessage()">→</button>
        </div>
    </main>
</div>

<div id="error"></div>

<script>
// ─────────────────────────── state ───────────────────────────
let me = null;                  // current user object
let activeThread = null;        // currently open thread id
let threadsCache = {};          // thread_id → thread metadata + unread
let messagesCache = {};         // thread_id → list of messages
let presenceCache = {};         // username → "online" | "offline"
let typingCache = {};           // thread_id → username currently typing
let sse = null;
let typingTimer = null;

// ─────────────────────────── helpers ─────────────────────────
async function api(method, path, body) {
    const opts = { method, headers: {"Content-Type":"application/json"} };
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch(path, opts);
    if (!r.ok) {
        const err = await r.json().catch(() => ({error: r.statusText}));
        throw new Error(err.error || "request failed");
    }
    return r.json();
}
function showError(msg) {
    const el = document.getElementById("error");
    el.textContent = msg;
    el.classList.add("visible");
    setTimeout(() => el.classList.remove("visible"), 4000);
}
function initials(name) {
    return (name || "?").slice(0,2).toUpperCase();
}
function fmtTime(ts) {
    if (!ts || ts === "0") return "";
    const d = new Date(parseInt(ts) * 1000);
    return d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
}

// ─────────────────────────── login ───────────────────────────
async function login(e) {
    e.preventDefault();
    const username = document.getElementById("username").value.trim();
    const display_name = document.getElementById("display_name").value.trim() || username;
    if (!username) return false;
    try {
        await api("POST", "/register", { username, display_name });
        me = { username, display_name };
        localStorage.setItem("soma_messages_user", JSON.stringify(me));
        await afterLogin();
    } catch (err) {
        showError(err.message);
    }
    return false;
}
async function afterLogin() {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").classList.add("visible");
    document.getElementById("me-avatar").textContent = initials(me.display_name);
    document.getElementById("me-name").textContent = me.display_name;

    // Mark online
    await api("POST", "/presence", { user: me.username, status: "online" });

    // Open SSE
    openSSE();

    // Initial load
    await refreshThreads();
}
function logout() {
    if (sse) sse.close();
    api("POST", "/presence", { user: me.username, status: "offline" }).catch(() => {});
    localStorage.removeItem("soma_messages_user");
    location.reload();
}

// ─────────────────────────── SSE ─────────────────────────────
function openSSE() {
    if (sse) sse.close();
    sse = new EventSource("/events");

    sse.addEventListener("new_message", e => {
        const m = JSON.parse(e.data);
        if (!messagesCache[m.thread]) messagesCache[m.thread] = [];
        messagesCache[m.thread].push(m);
        if (m.thread === activeThread) {
            renderMessages();
            // Mark messages from others as read immediately if we're looking at the thread
            if (m.from !== me.username) {
                api("POST", "/read", { message_id: m.id, by: me.username }).catch(() => {});
            }
        }
        refreshThreads();
    });

    sse.addEventListener("message_status", e => {
        const m = JSON.parse(e.data);
        if (messagesCache[m.thread]) {
            const idx = messagesCache[m.thread].findIndex(x => x.id === m.id);
            if (idx >= 0) messagesCache[m.thread][idx] = m;
        }
        if (m.thread === activeThread) renderMessages();
    });

    sse.addEventListener("typing_indicator", e => {
        const t = JSON.parse(e.data);
        if (t.user === me.username) return;
        typingCache[t.thread] = t.is_typing ? t.user : null;
        if (t.thread === activeThread) renderTyping();
    });

    sse.addEventListener("presence_change", e => {
        const p = JSON.parse(e.data);
        presenceCache[p.user] = p.status;
        renderPeerHeader();
    });

    sse.addEventListener("thread_created", e => {
        refreshThreads();
    });
}

// ─────────────────────────── threads ─────────────────────────
async function refreshThreads() {
    try {
        const list = await api("GET", `/threads/${me.username}`);
        threadsCache = {};
        for (const t of list) threadsCache[t.id] = t;
        renderThreadList(list);
    } catch (err) {
        // No threads yet — that's fine, this is a fresh user
    }
}
function renderThreadList(list) {
    const el = document.getElementById("thread-list");
    if (!list || list.length === 0) {
        el.innerHTML = `<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px">No chats yet. Start one above.</div>`;
        return;
    }
    el.innerHTML = list.map(t => {
        const peer = peerNameOf(t);
        const unread = parseInt(t.unread || "0");
        return `<div class="thread-item ${t.id === activeThread ? "active" : ""}" onclick="openThread('${t.id}')">
            <div class="avatar">${initials(peer)}</div>
            <div class="body">
                <div class="name">${peer}</div>
                <div class="preview">${t.last_from ? (t.last_from === me.username ? "You: " : "") + (t.last_message || "") : "<i>no messages yet</i>"}</div>
            </div>
            <div class="meta">
                <div>${fmtTime(t.last_message_at)}</div>
                ${unread > 0 ? `<span class="unread">${unread}</span>` : ""}
            </div>
        </div>`;
    }).join("");
}
function peerNameOf(t) {
    if (!t.members) return t.id;
    if (t.kind === "group") return `Group (${t.members.length})`;
    return t.members.find(m => m !== me.username) || t.id;
}

async function startThread() {
    const peer = document.getElementById("new-peer").value.trim();
    if (!peer || peer === me.username) return;
    try {
        const r = await api("POST", "/thread/new", {
            creator: me.username,
            members: [me.username, peer]
        });
        document.getElementById("new-peer").value = "";
        await refreshThreads();
        openThread(r.thread);
    } catch (err) {
        showError(err.message);
    }
}

async function openThread(id) {
    activeThread = id;
    document.querySelectorAll(".thread-item").forEach(el => el.classList.remove("active"));
    try {
        const data = await api("GET", `/thread/${id}`);
        messagesCache[id] = data.messages || [];
        threadsCache[id] = data.thread;
        document.getElementById("chat-empty").style.display = "none";
        document.getElementById("chat-header").classList.add("visible");
        document.getElementById("messages").classList.add("visible");
        document.getElementById("compose").classList.add("visible");
        renderPeerHeader();
        renderMessages();
        renderThreadList(Object.values(threadsCache).sort((a,b) => parseInt(b.last_message_at||0) - parseInt(a.last_message_at||0)));
        // Mark all unread incoming messages as read
        for (const m of messagesCache[id]) {
            if (m.from !== me.username && m.status !== "read") {
                api("POST", "/read", { message_id: m.id, by: me.username }).catch(() => {});
            }
        }
    } catch (err) {
        showError(err.message);
    }
}

function renderPeerHeader() {
    if (!activeThread) return;
    const t = threadsCache[activeThread];
    if (!t) return;
    const peer = peerNameOf(t);
    document.getElementById("peer-avatar").textContent = initials(peer);
    document.getElementById("peer-name").textContent = peer;
    const status = document.getElementById("peer-status");
    if (t.kind === "group") {
        status.textContent = `${t.members.length} members`;
        status.className = "status";
    } else {
        const peerUser = t.members.find(m => m !== me.username);
        const isOn = presenceCache[peerUser] === "online";
        status.textContent = isOn ? "online" : "last seen recently";
        status.className = isOn ? "status online" : "status";
    }
}

function renderMessages() {
    const el = document.getElementById("messages");
    const msgs = messagesCache[activeThread] || [];
    el.innerHTML = msgs.map(m => {
        const mine = m.from === me.username;
        const ticks = mine
            ? (m.status === "read" ? `<span class="ticks read">✓✓</span>`
              : m.status === "delivered" ? `<span class="ticks">✓✓</span>`
              : `<span class="ticks">✓</span>`)
            : "";
        const text = m.status === "deleted" ? "<i>(deleted)</i>" : escapeHtml(m.text);
        return `<div class="bubble ${mine ? "mine" : "theirs"} ${m.status === "deleted" ? "deleted" : ""}">
            <div class="text">${text}</div>
            <div class="meta">${fmtTime(m.sent_at)}${ticks}</div>
        </div>`;
    }).join("");
    el.scrollTop = el.scrollHeight;
}
function escapeHtml(s) {
    return (s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

function renderTyping() {
    const el = document.getElementById("typing");
    const who = typingCache[activeThread];
    if (who && who !== me.username) {
        el.textContent = `${who} is typing…`;
        el.classList.add("visible");
    } else {
        el.classList.remove("visible");
    }
}

// ─────────────────────────── compose ─────────────────────────
function onComposeKey(e) {
    if (e.key === "Enter") {
        sendMessage();
        return;
    }
    // Send a typing indicator (debounced)
    if (typingTimer) clearTimeout(typingTimer);
    api("POST", "/typing", { thread: activeThread, user: me.username, is_typing: true }).catch(() => {});
    typingTimer = setTimeout(() => {
        api("POST", "/typing", { thread: activeThread, user: me.username, is_typing: false }).catch(() => {});
    }, 1500);
}

async function sendMessage() {
    const input = document.getElementById("compose-input");
    const text = input.value.trim();
    if (!text || !activeThread) return;
    input.value = "";
    try {
        await api("POST", "/send", {
            from: me.username,
            thread: activeThread,
            text: text
        });
        // The new_message SSE event will refresh the view.
    } catch (err) {
        showError(err.message);
    }
}

// ─────────────────────────── boot ────────────────────────────
const stored = localStorage.getItem("soma_messages_user");
if (stored) {
    me = JSON.parse(stored);
    afterLogin();
}

window.addEventListener("beforeunload", () => {
    if (me) {
        navigator.sendBeacon("/presence",
            new Blob([JSON.stringify({user: me.username, status: "offline"})], {type:"application/json"}));
    }
});
</script>

</body>
</html>
