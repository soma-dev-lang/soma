<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Soma Trading</title>
</head>
<body>
<div class="soma-wrap">
    <div id="topbar"></div>
    <div id="kpis"></div>
    <div id="portfolio"></div>
    <div id="grid" class="soma-grid soma-g2">
        <div id="market"></div>
        <div id="orders"></div>
    </div>
    <div id="footer"></div>
</div>

<script src="/static/soma-ui.js"></script>
<script>
const {Topbar, KPIRow, Table, App, Footer, fmt} = SomaUI;

// Layout
Topbar('#topbar', {title: 'SOMA TRADING'});
const kpi = KPIRow('#kpis', [
    {id:'pnl', label:'Total P&L', signed:true},
    {id:'ret', label:'Return', signed:true},
    {id:'exp', label:'Exposure'},
    {id:'pos', label:'Positions'},
    {id:'ord', label:'Orders'},
]);
Footer('#footer', 'Soma Trading System &middot; Verified State Machines &middot; Live');

// Tables
const portfolio = Table('#portfolio', {
    title: 'Portfolio',
    key: 'symbol',
    cols: [
        {key:'symbol', label:'Instrument', class:'sym'},
        {key:'qty', label:'Pos', align:'right'},
        {key:'avg', label:'Entry', align:'right'},
        {key:'mid', label:'Last', align:'right', flash:true},
        {key:'mktval', label:'Mkt Val', align:'right'},
        {key:'pnl', label:'P&L', align:'right', flash:true, signed:true, class:(v)=>parseFloat(String(v).replace(/[+,]/g,''))>=0?'up':'dn'},
        {key:'ret', label:'Ret', align:'right', signed:true, class:(v)=>parseFloat(String(v).replace(/[+,]/g,''))>=0?'up':'dn'},
    ]
});

const market = Table('#market', {
    title: 'Market Data',
    key: 'symbol',
    cols: [
        {key:'symbol', label:'Instrument', class:'sym'},
        {key:'bid', label:'Bid', align:'right'},
        {key:'ask', label:'Ask', align:'right'},
        {key:'mid', label:'Last', align:'right', flash:true},
        {key:'chg', label:'Chg', align:'right', flash:true, signed:true, class:(v)=>parseFloat(String(v).replace(/[+,]/g,''))>=0?'up':'dn'},
    ]
});

const blotter = Table('#orders', {
    title: 'Order Blotter',
    key: '_idx',
    cols: [
        {key:'time', label:'Time', class:'lbl', format:v=>{if(!v)return'';const d=new Date(parseInt(v)*1000);return d.toLocaleTimeString('en-GB')}},
        {key:'symbol', label:'Instrument', class:'sym'},
        {key:'side', label:'Side', class:(v,r)=>r.side==='sell'?'sell lbl':'buy lbl', format:v=>(v||'').toUpperCase()},
        {key:'qty', label:'Qty', align:'right'},
        {key:'price', label:'Price', align:'right', format:v=>parseFloat(v||0).toFixed(2)},
        {key:'status', label:'Status', class:'lbl', format:(v)=>`<span class="badge ${v==='filled'?'b-fill':v==='rejected'?'b-rej':'b-pend'}">${v}</span>`},
    ]
});

// Data loop
App({refresh: 2000, onUpdate: async () => {
    try {
        const [prices, positions, orders, fills] = await Promise.all([
            fetch('/api/prices').then(r=>r.json()),
            fetch('/api/positions').then(r=>r.json()),
            fetch('/api/orders').then(r=>r.json()),
            fetch('/api/fills').then(r=>r.json()),
        ]);

        // Market
        const sorted = prices.filter(p=>p.symbol).sort((a,b)=>a.symbol.localeCompare(b.symbol));
        market.update(sorted.map(p=>({...p, chg:(parseFloat(p['return']||0).toFixed(2))+'%'})));

        // Portfolio + P&L
        let totalPnl=0, totalExp=0;
        const rows = positions.filter(p=>p.symbol&&parseInt(p.qty||0)!==0)
            .sort((a,b)=>a.symbol.localeCompare(b.symbol))
            .map(pos=>{
                const qty=parseInt(pos.qty||0), s=pos.symbol;
                const p=sorted.find(x=>x.symbol===s);
                const mid=p?parseFloat(p.mid):0;
                const sf=fills.filter(f=>f.symbol===s);
                let tc=0,tq=0;
                sf.forEach(f=>{const q=parseInt(f.qty||0),fp=parseFloat(f.price||0);f.side==='buy'?(tc+=q*fp,tq+=q):(tc-=q*fp,tq-=q)});
                const avg=tq>0?tc/tq:0, mv=qty*mid, cb=qty*avg, pnl=mv-cb, ret=cb>0?pnl/cb*100:0;
                totalPnl+=pnl; totalExp+=Math.abs(mv);
                return {symbol:s, qty:fmt(qty), avg:avg.toFixed(2), mid:mid.toFixed(2), mktval:fmt(Math.round(mv)), pnl:fmt(Math.round(pnl)), ret:ret.toFixed(2)+'%'};
            });
        portfolio.update(rows);
        if(rows.length) {
            const totRet = totalExp>0?(totalPnl/totalExp*100):0;
            portfolio.setTotal({symbol:'TOTAL', mktval:fmt(Math.round(totalExp)), pnl:fmt(Math.round(totalPnl)), ret:totRet.toFixed(2)+'%'});
        }

        // KPIs
        const retPct = totalExp>0?(totalPnl/totalExp*100):0;
        kpi.pnl.set(fmt(Math.round(totalPnl)));
        kpi.ret.set(retPct.toFixed(2)+'%');
        kpi.exp.set(fmt(Math.round(totalExp)));
        kpi.pos.set(rows.length);
        kpi.ord.set(orders.filter(o=>o.id).length);

        // Orders (newest first)
        const recent = orders.filter(o=>o.id).slice(-20).reverse().map((o,i)=>({...o, _idx:'o'+i, time:o.created_at}));
        blotter.update(recent);

    } catch(e) { console.error(e); }
}});
</script>
</body>
</html>
