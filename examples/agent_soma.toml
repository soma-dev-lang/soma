[package]
name = "researcher-agent"
version = "0.1.0"
description = "Verified AI research agent"

[agent]
provider = "ollama"
model = "gemma3:12b"

# For OpenAI:
# provider = "openai"
# model = "gpt-4o-mini"
# key = "${OPENAI_API_KEY}"

# For Anthropic (Claude):
# provider = "anthropic"
# model = "claude-opus-4-6"
# key = "${ANTHROPIC_API_KEY}"

# ${VAR} expands env vars at runtime — never put raw keys in this file

[verify]
deadlock_free = true
eventually = ["done", "failed"]

[verify.after.researching]
eventually = ["analyzing", "failed"]

[verify.after.analyzing]
eventually = ["done", "failed"]
